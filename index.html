<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calleando CABA · Mapa interactivo</title>

    <!-- Leaflet (mapa) -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />

    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Mapa fullscreen -->
    <div id="map" role="application" aria-label="Mapa interactivo de calles de Buenos Aires"></div>

    <!-- Caja de búsqueda flotante (estilo Google Maps) -->
    <div id="search-box" class="search-box">
        <div class="search-input-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input
                type="text"
                id="search-input"
                placeholder="Buscar una calle, plaza o avenida…"
                autocomplete="off"
                spellcheck="false"
                aria-label="Buscar"
            />
            <button id="clear-btn" class="clear-btn" type="button" aria-label="Borrar búsqueda" hidden>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
                </svg>
            </button>
            <button id="search-btn" class="search-btn" type="button" aria-label="Buscar">
                Buscar
            </button>
        </div>

        <!-- Autocomplete dropdown -->
        <ul id="suggestions" class="suggestions" role="listbox" hidden></ul>
    </div>

    <!-- Filtro por barrio (flotante abajo a la derecha, al lado del zoom) -->
    <div class="barrio-filter">
        <select id="barrio-select" aria-label="Filtrar por barrio o comuna">
            <option value="">Vista general</option>
            <option value="__overlay_barrios__">Mostrar división por barrios</option>
            <option value="__overlay_comunas__">Mostrar división por comunas</option>
        </select>
    </div>

    <!-- Filtro por categoría -->
    <div class="categoria-filter">
        <select id="categoria-select" aria-label="Filtrar por categoría">
            <option value="">Todas las categorías</option>
        </select>
    </div>

    <!-- Botón "calle al azar" -->
    <button
        id="random-btn"
        class="random-btn"
        type="button"
        aria-label="Mostrar una calle al azar"
        title="Calle al azar"
    >
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7.5 8c.83 0 1.5.67 1.5 1.5S8.33 11 7.5 11 6 10.33 6 9.5 6.67 8 7.5 8zm9 8c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm-4.5-4c-.83 0-1.5-.67-1.5-1.5S11.17 9 12 9s1.5.67 1.5 1.5S12.83 12 12 12zm4.5-4c-.83 0-1.5-.67-1.5-1.5S15.67 5 16.5 5 18 5.67 18 6.5 17.33 8 16.5 8zM7.5 18c-.83 0-1.5-.67-1.5-1.5S6.67 15 7.5 15 9 15.67 9 16.5 8.33 18 7.5 18z"/>
        </svg>
    </button>

    <!-- Botón de cambio de tema del mapa -->
    <div class="theme-toggle" id="theme-toggle">
        <button
            class="theme-toggle-btn"
            id="theme-toggle-btn"
            type="button"
            aria-label="Cambiar estilo del mapa"
            title="Cambiar estilo del mapa"
        >
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 22C6.49 22 2 17.51 2 12S6.49 2 12 2s10 4.04 10 9c0 3.31-2.69 6-6 6h-1.77c-.28 0-.5.22-.5.5 0 .12.05.23.13.33.41.47.64 1.06.64 1.67A2.5 2.5 0 0 1 12 22zm0-18c-4.41 0-8 3.59-8 8s3.59 8 8 8c.28 0 .5-.22.5-.5a.54.54 0 0 0-.14-.35c-.41-.46-.63-1.05-.63-1.65a2.5 2.5 0 0 1 2.5-2.5H16c2.21 0 4-1.79 4-4 0-3.86-3.59-7-8-7z"/>
                <circle cx="6.5" cy="11.5" r="1.5"/>
                <circle cx="9.5" cy="7.5" r="1.5"/>
                <circle cx="14.5" cy="7.5" r="1.5"/>
                <circle cx="17.5" cy="11.5" r="1.5"/>
            </svg>
        </button>
        <ul class="theme-menu" id="theme-menu" hidden>
            <li data-tema="voyager"><span class="theme-dot voyager"></span>Voyager</li>
            <li data-tema="claro"><span class="theme-dot claro"></span>Claro</li>
            <li data-tema="oscuro"><span class="theme-dot oscuro"></span>Oscuro</li>
        </ul>
    </div>

    <!-- Mensaje de estado (cargando, error, no encontrado) -->
    <div id="status-toast" class="status-toast" hidden></div>

    <!-- Atribuciones y créditos discretos -->
    <div id="credits" class="credits">
        <span>Datos: calleando.xlsx · Mapa base © <a href="https://carto.com/attributions" target="_blank" rel="noopener">CARTO</a> / © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a></span>
    </div>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>

    <script src="script.js"></script>
</body>
</html>
